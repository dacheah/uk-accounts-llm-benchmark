name: tests

# Verifies the grader that every published score depends on.
# No API keys or model calls needed — grading logic only.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Run grader tests
        run: pytest tests/ -q
